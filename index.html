<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Nama Tab sesuai permintaan -->
    <title>REFORMAT by IRS</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        .font-share { font-family: 'Share Tech', sans-serif; }
        
        /* Custom Scrollbar untuk Terminal Log */
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #64748b; border-radius: 0; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* KANVAS: Background Biru Sangat Muda & Pattern Grid (Mirip REFORNAM) */
        body {
            background-color: #f4f9ff; /* Biru muda yg muda banget */
            background-image: 
                linear-gradient(rgba(37, 99, 235, 0.06) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(37, 99, 235, 0.06) 1px, transparent 1px);
            background-size: 20px 20px;
            
            /* KUNCI UTAMA: Mematikan pergerakan atas-bawah layar secara global */
            overflow: hidden; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            margin: 0;
            padding: 15px;
        }

        /* Hapus lengkungan agar seragam gaya Kotak Tajam */
        .kotak-tegas { border-radius: 0 !important; }
    </style>
</head>
<body class="text-slate-800 font-share selection:bg-blue-500/30">

    <!-- Pembungkus Utama agar sejajar ke tengah -->
    <div class="w-full max-w-[600px] flex flex-col gap-2">
        
        <!-- Header / Title Card -->
        <div class="bg-white border-2 border-[#d1d5db] p-4 shadow-sm flex justify-between items-center kotak-tegas relative z-10 w-full">
            <div class="flex items-center gap-3">
                <i data-lucide="terminal-square" class="w-8 h-8 text-blue-600"></i>
                <h1 class="text-[36px] font-bold tracking-widest text-blue-600 leading-none m-0 uppercase">REFORMAT</h1>
            </div>
            <div class="flex flex-col items-end justify-center font-bold tracking-widest leading-none">
                <span id="clock" class="text-slate-800 text-[22px] leading-tight">00:00:00</span>
                <span id="dateDisplay" class="text-slate-500 text-xs leading-tight mt-0.5">00/00/0000</span>
            </div>
        </div>

        <!-- Main Content Card - TINGGI DIKUNCI (FIXED HEIGHT) 580px -->
        <div class="bg-white border-2 border-[#d1d5db] shadow-xl p-5 w-full h-[580px] flex flex-col relative z-10 kotak-tegas">
            
            <!-- Top Link Buttons -->
            <div class="flex gap-3 mb-4">
                <a href="https://lynk.id/isaproject" target="_blank" rel="noopener noreferrer" class="flex-1 flex items-center justify-center gap-2 bg-white border-2 border-slate-300 text-slate-700 h-[40px] hover:bg-blue-50 hover:text-blue-700 hover:border-blue-300 transition-all font-bold tracking-widest text-sm kotak-tegas">
                    <i data-lucide="briefcase" class="w-4 h-4 text-blue-500"></i> MY PROJECT
                </a>
                <a href="https://lynk.id/isaproject/0581ez0729vx" target="_blank" rel="noopener noreferrer" class="flex-1 flex items-center justify-center gap-2 bg-white border-2 border-slate-300 text-slate-700 h-[40px] hover:bg-amber-50 hover:text-amber-700 hover:border-amber-300 transition-all font-bold tracking-widest text-sm kotak-tegas">
                    <i data-lucide="coffee" class="w-4 h-4 text-amber-500"></i> SUPPORT
                </a>
            </div>

            <!-- Folder Inputs -->
            <div class="flex flex-col gap-3 mb-4">
                <!-- Source -->
                <div class="space-y-1">
                    <label class="text-[13px] font-bold text-blue-600 tracking-widest uppercase">Folder Asal</label>
                    <div class="flex gap-2 h-[40px]">
                        <div id="sourcePath" class="flex-1 bg-slate-50 border-2 border-slate-300 flex items-center px-3 text-sm text-slate-600 truncate font-bold kotak-tegas" title="Belum dipilih">Belum ada folder terpilih...</div>
                        <button id="btnBrowseSource" onclick="selectSourceFolder()" class="bg-blue-600 text-white px-5 hover:bg-blue-700 transition-colors flex items-center gap-2 font-bold tracking-widest text-sm disabled:opacity-50 kotak-tegas shadow-[0_3px_0_rgba(0,0,0,0.2)] active:translate-y-[2px] active:shadow-none border-none">
                            PILIH
                        </button>
                    </div>
                </div>

                <!-- Destination -->
                <div class="space-y-1">
                    <label class="text-[13px] font-bold text-blue-600 tracking-widest uppercase">Folder Tujuan</label>
                    <div class="flex gap-2 h-[40px]">
                        <div id="destPath" class="flex-1 bg-slate-50 border-2 border-slate-300 flex items-center px-3 text-sm text-slate-600 truncate font-bold kotak-tegas" title="Belum dipilih">Belum ada folder terpilih...</div>
                        <button id="btnBrowseDest" onclick="selectDestFolder()" class="bg-blue-600 text-white px-5 hover:bg-blue-700 transition-colors flex items-center gap-2 font-bold tracking-widest text-sm disabled:opacity-50 kotak-tegas shadow-[0_3px_0_rgba(0,0,0,0.2)] active:translate-y-[2px] active:shadow-none border-none">
                            PILIH
                        </button>
                    </div>
                </div>
            </div>

            <!-- Config Grid -->
            <div class="grid grid-cols-5 gap-3 mb-4">
                <div class="col-span-2">
                    <label class="block text-[13px] text-blue-600 uppercase tracking-widest mb-1 font-bold">Ubah Menjadi:</label>
                    <div class="flex relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-blue-600 font-bold">.</span>
                        <input type="text" id="targetExtension" oninput="validateStart()" placeholder="csv, txt, md" class="w-full pl-6 bg-slate-50 border-2 border-slate-300 text-slate-800 focus:border-blue-500 block px-2 outline-none uppercase text-sm h-[40px] font-bold kotak-tegas">
                    </div>
                </div>

                <div class="col-span-3">
                    <label class="block text-[13px] text-blue-600 uppercase tracking-widest mb-1 font-bold">Metode:</label>
                    <div class="flex gap-2 h-[40px]">
                        <button id="btnModeCopy" onclick="setOperation('copy')" class="flex-1 flex items-center justify-center gap-2 text-[13px] transition-colors border-2 bg-blue-50 border-blue-500 text-blue-700 font-bold kotak-tegas">
                            SALIN
                        </button>
                        <button id="btnModeMove" onclick="setOperation('move')" class="flex-1 flex items-center justify-center gap-2 text-[13px] transition-colors border-2 bg-slate-50 border-slate-300 text-slate-600 hover:bg-white font-bold kotak-tegas">
                            PINDAH
                        </button>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <!-- mt-auto akan menempelkannya secara dinamis tanpa merubah tinggi utama -->
            <div class="flex gap-2 h-[45px] mb-4 mt-auto">
                <button id="btnStart" onclick="handleStart()" disabled class="flex-1 flex items-center justify-center gap-1.5 text-white bg-blue-600 hover:bg-blue-700 transition-all font-bold tracking-widest disabled:opacity-50 disabled:bg-slate-400 text-[15px] shadow-[0_4px_0_rgba(0,0,0,0.2)] active:translate-y-[2px] active:shadow-none kotak-tegas border-none">
                    START
                </button>
                
                <button id="btnPause" onclick="handlePauseResume()" disabled class="flex-1 flex items-center justify-center gap-1.5 text-white bg-amber-500 hover:bg-amber-600 transition-all font-bold tracking-widest disabled:opacity-50 disabled:bg-slate-400 text-[15px] shadow-[0_4px_0_#b45309] active:translate-y-[2px] active:shadow-none kotak-tegas border-none">
                    <span id="textPause">PAUSE</span>
                </button>

                <button id="btnStop" onclick="handleStop()" disabled class="flex-1 flex items-center justify-center gap-1.5 text-white bg-red-500 hover:bg-red-600 transition-all font-bold tracking-widest disabled:opacity-50 disabled:bg-slate-400 text-[15px] shadow-[0_4px_0_#b91c1c] active:translate-y-[2px] active:shadow-none kotak-tegas border-none">
                    STOP
                </button>
            </div>

            <!-- Terminal Logs -->
            <div>
                <div class="flex justify-between items-end mb-1.5">
                    <label class="text-[13px] font-bold text-blue-600 tracking-widest uppercase">Logs Aktivitas</label>
                    <div class="flex gap-4">
                        <button id="btnCopyLog" onclick="copyLogs()" disabled class="text-[11px] font-bold text-blue-600 hover:text-blue-800 transition-colors uppercase tracking-widest disabled:opacity-50 underline">
                            Copy Logs
                        </button>
                        <button id="btnClearLog" onclick="clearLogs()" disabled class="text-[11px] font-bold text-blue-600 hover:text-blue-800 transition-colors uppercase tracking-widest disabled:opacity-50 underline">
                            Clear Logs
                        </button>
                    </div>
                </div>
                
                <!-- Tinggi logs dikurangi jadi 110px agar pas sempurna dengan fixed height -->
                <div id="logPanel" class="h-[110px] bg-[#111827] border-2 border-slate-300 p-3 font-mono text-[11px] overflow-y-auto custom-scrollbar relative shadow-inner tracking-wider kotak-tegas">
                    <div id="emptyLog" class="text-slate-500 absolute inset-0 flex items-center justify-center tracking-widest text-[12px]">
                        SISTEM SIAP...
                    </div>
                    <div id="logContent" class="space-y-1"></div>
                </div>
            </div>

        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        lucide.createIcons();

        let sourceDirHandle = null;
        let destHandle = null;
        let sourceFiles = [];
        let operationType = 'copy';
        let processState = 'idle'; 

        // Update Jam & Waktu
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${h}:${m}:${s}`;
            
            const dd = String(now.getDate()).padStart(2, '0');
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const yyyy = now.getFullYear();
            document.getElementById('dateDisplay').textContent = `${dd}/${mm}/${yyyy}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Engine Logs
        function addLog(message, type = 'info') {
            document.getElementById('emptyLog').style.display = 'none';
            document.getElementById('btnCopyLog').disabled = false;
            document.getElementById('btnClearLog').disabled = false;

            const time = new Date().toLocaleTimeString('id-ID', { hour12: false });
            const logContent = document.getElementById('logContent');
            const logPanel = document.getElementById('logPanel');

            let colorClass = 'text-slate-300';
            if(type === 'error') colorClass = 'text-red-400';
            if(type === 'success') colorClass = 'text-emerald-400';
            if(type === 'warning') colorClass = 'text-yellow-400';

            const div = document.createElement('div');
            div.className = colorClass;
            div.innerHTML = `<span class="text-slate-500 opacity-70">[${time}]</span> ${message}`;
            
            logContent.appendChild(div);
            // Auto scroll yang tidak mempengaruhi body utama
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function clearLogs() {
            document.getElementById('logContent').innerHTML = '';
            document.getElementById('emptyLog').style.display = 'flex';
            document.getElementById('btnCopyLog').disabled = true;
            document.getElementById('btnClearLog').disabled = true;
        }

        function copyLogs() {
            const logs = Array.from(document.getElementById('logContent').children).map(el => el.innerText).join('\n');
            navigator.clipboard.writeText(logs).then(() => {
                addLog("Logs berhasil disalin ke clipboard", "success");
            }).catch(() => {
                addLog("Gagal menyalin logs", "error");
            });
        }

        // Mode: Copy / Move
        function setOperation(type) {
            if(processState === 'running') return;
            operationType = type;
            const btnCopy = document.getElementById('btnModeCopy');
            const btnMove = document.getElementById('btnModeMove');

            if(type === 'copy') {
                btnCopy.className = "flex-1 flex items-center justify-center gap-2 text-[13px] transition-colors border-2 bg-blue-50 border-blue-500 text-blue-700 font-bold kotak-tegas";
                btnMove.className = "flex-1 flex items-center justify-center gap-2 text-[13px] transition-colors border-2 bg-slate-50 border-slate-300 text-slate-600 hover:bg-white font-bold kotak-tegas";
            } else {
                btnMove.className = "flex-1 flex items-center justify-center gap-2 text-[13px] transition-colors border-2 bg-orange-50 border-orange-500 text-orange-700 font-bold kotak-tegas";
                btnCopy.className = "flex-1 flex items-center justify-center gap-2 text-[13px] transition-colors border-2 bg-slate-50 border-slate-300 text-slate-600 hover:bg-white font-bold kotak-tegas";
            }
        }

        // Validasi Start Button
        function validateStart() {
            const ext = document.getElementById('targetExtension').value.trim();
            const btnStart = document.getElementById('btnStart');
            if (sourceFiles.length > 0 && destHandle && ext !== '' && processState !== 'running') {
                btnStart.disabled = false;
            } else {
                btnStart.disabled = true;
            }
        }

        // Kunci UI saat berjalan
        function updateUIState(state) {
            processState = state;
            const isRunning = state === 'running' || state === 'paused';
            
            document.getElementById('btnBrowseSource').disabled = isRunning;
            document.getElementById('btnBrowseDest').disabled = isRunning;
            document.getElementById('targetExtension').disabled = isRunning;
            document.getElementById('btnModeCopy').disabled = isRunning;
            document.getElementById('btnModeMove').disabled = isRunning;
            
            document.getElementById('btnStart').disabled = isRunning;
            document.getElementById('btnPause').disabled = !isRunning;
            document.getElementById('btnStop').disabled = !isRunning;

            const textPause = document.getElementById('textPause');
            
            if (state === 'paused') {
                textPause.innerText = 'RESUME';
            } else {
                textPause.innerText = 'PAUSE';
            }
            if(state === 'idle' || state === 'stopped') validateStart();
        }

        // Sistem Genggam Folder Murni (API Native Chrome)
        async function selectSourceFolder() {
            try {
                sourceDirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                document.getElementById('sourcePath').innerText = sourceDirHandle.name;
                addLog(`Mengakses folder asal: ${sourceDirHandle.name}...`);
                
                sourceFiles = [];
                for await (const entry of sourceDirHandle.values()) {
                    if (entry.kind === 'file') {
                        sourceFiles.push({ handle: entry, name: entry.name });
                    }
                }
                addLog(`Ditemukan ${sourceFiles.length} file di folder asal.`, 'success');
                validateStart();
            } catch (error) {
                addLog(`Akses Folder Asal dibatalkan/ditolak.`, 'error');
            }
        }

        async function selectDestFolder() {
            try {
                destHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                document.getElementById('destPath').innerText = destHandle.name;
                addLog(`Folder tujuan diatur ke: ${destHandle.name}`, 'success');
                validateStart();
            } catch (error) {
                addLog(`Akses Folder Tujuan dibatalkan/ditolak.`, 'error');
            }
        }

        // Mesin Eksekusi File Langsung
        async function handleStart() {
            let extInput = document.getElementById('targetExtension').value.trim();
            if(!extInput.startsWith('.')) extInput = '.' + extInput;

            updateUIState('running');
            addLog(`MEMULAI PROSES ${operationType.toUpperCase()}...`);

            const totalFiles = sourceFiles.length;

            for (let i = 0; i < totalFiles; i++) {
                while (processState === 'paused') {
                    await new Promise(r => setTimeout(r, 200));
                }

                if (processState === 'stopped') {
                    addLog('Proses dihentikan oleh pengguna.', 'warning');
                    break;
                }

                const fileItem = sourceFiles[i];
                const lastDotIndex = fileItem.name.lastIndexOf('.');
                const baseName = lastDotIndex > 0 ? fileItem.name.substring(0, lastDotIndex) : fileItem.name;
                const newFileName = baseName + extInput;

                try {
                    addLog(`[${i + 1}/${totalFiles}] Memproses: ${fileItem.name} -> ${newFileName}...`);
                    
                    const fileData = await fileItem.handle.getFile();

                    // Tulis file ke destinasi
                    const newFileHandle = await destHandle.getFileHandle(newFileName, { create: true });
                    const writable = await newFileHandle.createWritable();
                    await writable.write(fileData);
                    await writable.close();

                    // Eksekusi Pindah (Hapus aslinya)
                    if (operationType === 'move') {
                        await sourceDirHandle.removeEntry(fileItem.name);
                        addLog(`[${i + 1}/${totalFiles}] Dipindah & Asli dihapus: ${newFileName}`, 'success');
                    } else {
                        addLog(`[${i + 1}/${totalFiles}] Disalin: ${newFileName}`, 'success');
                    }

                } catch (error) {
                    addLog(`[${i + 1}/${totalFiles}] Gagal: ${fileItem.name} (${error.message})`, 'error');
                }
            }

            if (processState === 'running') {
                addLog('SEMUA PROSES SELESAI!', 'success');
                updateUIState('idle');
            }
        }

        function handlePauseResume() {
            if (processState === 'running') {
                updateUIState('paused');
                addLog('Proses DIJEDA.', 'warning');
            } else if (processState === 'paused') {
                updateUIState('running');
                addLog('Proses DILANJUTKAN.');
            }
        }

        function handleStop() {
            updateUIState('stopped');
        }
    </script>
</body>
</html>

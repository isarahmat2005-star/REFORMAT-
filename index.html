<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REFORMAT by IRS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        .font-share { font-family: 'Share Tech', sans-serif; }
        
        /* Custom Scrollbar for terminal logs */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }

        /* Mencegah pergerakan scroll pada body di HP (Bounce effect) */
        body {
            overscroll-behavior-y: none;
        }
    </style>
</head>
<!-- Mengunci layar: h-[100dvh] dan overflow-hidden mematikan scroll atas bawah -->
<body class="h-[100dvh] w-full overflow-hidden bg-[#f4faff] text-slate-800 font-share selection:bg-indigo-500/30 flex flex-col relative z-0">

    <!-- CANVAS BACKGROUND (Biru Muda Geometris) -->
    <div class="absolute inset-0 z-[-1] overflow-hidden pointer-events-none">
        <div class="absolute top-[5%] left-[-10%] w-[120%] h-[90%] bg-sky-100/40 border border-sky-200/60 rounded-[40px] transform -rotate-3"></div>
        <div class="absolute top-[15%] right-[-5%] w-[90%] h-[80%] bg-[#e0f2fe]/50 border border-blue-100/50 rounded-3xl transform rotate-2"></div>
        <div class="absolute -bottom-[20%] left-[20%] w-[60%] h-[50%] bg-indigo-50/40 rounded-[60px] transform rotate-12 blur-sm"></div>
    </div>

    <!-- Header (Tinggi sedikit disesuaikan) -->
    <header class="shrink-0 w-full bg-white/80 backdrop-blur-md border-b border-sky-100 shadow-sm z-50 px-4 flex items-center justify-between h-14">
        <div class="flex items-center gap-2">
            <i data-lucide="terminal-square" class="w-6 h-6 text-indigo-600"></i>
            <h1 class="text-2xl font-bold tracking-widest text-indigo-900 leading-none mt-1">
                REFORMAT
            </h1>
        </div>
        <div class="flex flex-col items-end justify-center font-bold tracking-widest leading-none">
            <span id="clock" class="text-indigo-600 text-[16px] leading-tight">00:00:00</span>
            <span id="dateDisplay" class="text-slate-400 text-[10px] leading-tight mt-0.5">00/00/0000</span>
        </div>
    </header>

    <!-- Main Content Wrapper (Fleksibel menengahkan konten tanpa scroll) -->
    <main class="flex-1 flex flex-col items-center justify-center w-full max-w-2xl mx-auto px-4 min-h-0">
        
        <div class="w-full flex flex-col gap-3">
            
            <!-- Top Link Buttons (Dibuat lebih ringkas) -->
            <div class="flex gap-3 shrink-0">
                <a href="https://lynk.id/isaproject" target="_blank" rel="noopener noreferrer" class="flex-1 flex items-center justify-center gap-2 bg-white/90 border border-sky-200 text-slate-700 py-2 rounded-lg hover:bg-sky-50 hover:text-indigo-700 transition-all font-bold tracking-widest text-xs shadow-sm group">
                    <i data-lucide="briefcase" class="w-3.5 h-3.5 text-indigo-500 group-hover:scale-110 transition-transform"></i>
                    MY PROJECT
                </a>
                <a href="https://lynk.id/isaproject/0581ez0729vx" target="_blank" rel="noopener noreferrer" class="flex-1 flex items-center justify-center gap-2 bg-white/90 border border-amber-200 text-slate-700 py-2 rounded-lg hover:bg-amber-50 hover:text-amber-700 transition-all font-bold tracking-widest text-xs shadow-sm group">
                    <i data-lucide="coffee" class="w-3.5 h-3.5 text-amber-500 group-hover:scale-110 transition-transform"></i>
                    SUPPORT
                </a>
            </div>

            <!-- Main Single Card Container -->
            <div class="bg-white/95 backdrop-blur border border-white/40 rounded-xl shadow-xl shadow-sky-900/5 p-4 flex flex-col gap-4 shrink-0">
                
                <!-- 1. Bagian Folder Input -->
                <div class="flex flex-col gap-3">
                    <!-- Folder Asal -->
                    <div class="flex flex-col gap-1">
                        <label class="text-[11px] font-bold text-slate-500 tracking-widest uppercase">Folder Asal</label>
                        <div class="flex gap-2 h-9">
                            <div id="sourcePath" class="flex-1 bg-slate-50 border border-slate-200 rounded-md flex items-center px-2.5 text-[13px] text-slate-600 truncate" title="Belum dipilih">
                                Belum dipilih...
                            </div>
                            <button id="btnBrowseSource" onclick="selectSourceFolder()" class="bg-white border border-indigo-200 text-indigo-600 px-3 rounded-md hover:bg-indigo-50 transition-colors flex items-center gap-1.5 font-bold tracking-widest text-[13px] disabled:opacity-50">
                                <i data-lucide="folder-open" class="w-3.5 h-3.5"></i> PILIH
                            </button>
                        </div>
                    </div>

                    <!-- Folder Tujuan -->
                    <div class="flex flex-col gap-1">
                        <label class="text-[11px] font-bold text-slate-500 tracking-widest uppercase">Folder Tujuan</label>
                        <div class="flex gap-2 h-9">
                            <div id="destPath" class="flex-1 bg-slate-50 border border-slate-200 rounded-md flex items-center px-2.5 text-[13px] text-slate-600 truncate" title="Belum dipilih">
                                Belum dipilih...
                            </div>
                            <button id="btnBrowseDest" onclick="selectDestFolder()" class="bg-white border border-emerald-200 text-emerald-600 px-3 rounded-md hover:bg-emerald-50 transition-colors flex items-center gap-1.5 font-bold tracking-widest text-[13px] disabled:opacity-50">
                                <i data-lucide="folder-output" class="w-3.5 h-3.5"></i> PILIH
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 2. Pengaturan Ekstensi & Metode -->
                <div class="grid grid-cols-5 gap-3">
                    <div class="col-span-2">
                        <label class="block text-[11px] text-slate-500 uppercase tracking-widest mb-1 font-bold">Ubah menjadi:</label>
                        <div class="flex relative h-9">
                            <span class="absolute left-2.5 top-1/2 -translate-y-1/2 text-indigo-600 font-bold">.</span>
                            <input type="text" id="targetExtension" oninput="validateStart()" placeholder="csv, txt" class="w-full pl-6 bg-slate-50 border border-slate-200 text-slate-800 rounded-md focus:ring-1 focus:ring-indigo-500 block px-2 outline-none uppercase text-[13px]">
                        </div>
                    </div>

                    <div class="col-span-3">
                        <label class="block text-[11px] text-slate-500 uppercase tracking-widest mb-1 font-bold">Metode:</label>
                        <div class="flex gap-1.5 h-9">
                            <button id="btnModeCopy" onclick="setOperation('copy')" class="flex-1 flex items-center justify-center gap-1.5 rounded-md text-[11px] transition-colors border bg-indigo-50 border-indigo-300 text-indigo-700 font-bold">
                                <i data-lucide="copy" class="w-3.5 h-3.5"></i> SALIN
                            </button>
                            <button id="btnModeMove" onclick="setOperation('move')" class="flex-1 flex items-center justify-center gap-1.5 rounded-md text-[11px] transition-colors border bg-slate-50 border-slate-200 text-slate-600 hover:bg-white font-bold">
                                <i data-lucide="arrow-right-left" class="w-3.5 h-3.5"></i> PINDAH
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 3. Action Buttons -->
                <div class="flex gap-2 h-10 mt-1">
                    <button id="btnStart" onclick="handleStart()" disabled class="flex-1 flex items-center justify-center gap-1.5 text-white bg-indigo-600 rounded-md hover:bg-indigo-700 transition-all font-bold tracking-widest disabled:opacity-50 disabled:bg-slate-400 text-sm shadow-sm">
                        <i data-lucide="play" class="w-4 h-4 fill-current"></i> START
                    </button>
                    
                    <button id="btnPause" onclick="handlePauseResume()" disabled class="flex-1 flex items-center justify-center gap-1.5 text-slate-700 bg-white border border-slate-200 rounded-md hover:bg-slate-50 transition-all font-bold tracking-widest disabled:opacity-50 disabled:text-slate-400 text-sm shadow-sm">
                        <i id="iconPause" data-lucide="pause" class="w-4 h-4"></i> <span id="textPause">PAUSE</span>
                    </button>

                    <button id="btnStop" onclick="handleStop()" disabled class="flex-1 flex items-center justify-center gap-1.5 text-red-600 bg-white border border-red-200 rounded-md hover:bg-red-50 transition-all font-bold tracking-widest disabled:opacity-50 disabled:border-slate-200 disabled:text-slate-400 text-sm shadow-sm">
                        <i data-lucide="square" class="w-4 h-4 fill-current"></i> STOP
                    </button>
                </div>

                <!-- 4. Terminal Logs Section (Tinggi diperkecil: h-[100px]) -->
                <div class="flex flex-col">
                    <div class="flex justify-between items-end mb-1 px-0.5">
                        <label class="text-[11px] font-bold text-slate-500 tracking-widest uppercase">Logs Aktivitas</label>
                        <div class="flex gap-3">
                            <button id="btnCopyLog" onclick="copyLogs()" disabled class="text-[10px] font-bold text-slate-400 hover:text-indigo-600 transition-colors uppercase tracking-widest disabled:opacity-50">
                                Salin
                            </button>
                            <button id="btnClearLog" onclick="clearLogs()" disabled class="text-[10px] font-bold text-slate-400 hover:text-red-600 transition-colors uppercase tracking-widest disabled:opacity-50">
                                Hapus
                            </button>
                        </div>
                    </div>
                    
                    <div id="logPanel" class="h-[100px] bg-slate-900 border border-slate-800 rounded-md p-2 font-share text-[11px] overflow-y-auto custom-scrollbar relative shadow-inner tracking-wider">
                        <div id="emptyLog" class="text-slate-500 absolute inset-0 flex items-center justify-center tracking-widest">
                            SISTEM SIAP...
                        </div>
                        <div id="logContent" class="space-y-0.5"></div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        let sourceDirHandle = null;
        let destHandle = null;
        let sourceFiles = [];
        let operationType = 'copy';
        let processState = 'idle'; 
        let logsCount = 0;

        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${h}:${m}:${s}`;
            
            const dd = String(now.getDate()).padStart(2, '0');
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const yyyy = now.getFullYear();
            document.getElementById('dateDisplay').textContent = `${dd}/${mm}/${yyyy}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function addLog(message, type = 'info') {
            document.getElementById('emptyLog').style.display = 'none';
            document.getElementById('btnCopyLog').disabled = false;
            document.getElementById('btnClearLog').disabled = false;

            const time = new Date().toLocaleTimeString('id-ID', { hour12: false });
            const logContent = document.getElementById('logContent');
            const logPanel = document.getElementById('logPanel');

            let colorClass = 'text-slate-300';
            if(type === 'error') colorClass = 'text-red-400';
            if(type === 'success') colorClass = 'text-emerald-400';
            if(type === 'warning') colorClass = 'text-yellow-400';

            const div = document.createElement('div');
            div.className = colorClass;
            div.innerHTML = `<span class="text-slate-500 opacity-70">[${time}]</span> ${message}`;
            
            logContent.appendChild(div);
            logPanel.scrollTop = logPanel.scrollHeight;
            logsCount++;
        }

        function clearLogs() {
            document.getElementById('logContent').innerHTML = '';
            document.getElementById('emptyLog').style.display = 'flex';
            document.getElementById('btnCopyLog').disabled = true;
            document.getElementById('btnClearLog').disabled = true;
            logsCount = 0;
        }

        function copyLogs() {
            const logs = Array.from(document.getElementById('logContent').children).map(el => el.innerText).join('\n');
            navigator.clipboard.writeText(logs).then(() => {
                addLog("Logs berhasil disalin", "success");
            }).catch(() => {
                addLog("Gagal menyalin logs", "error");
            });
        }

        function setOperation(type) {
            if(processState === 'running') return;
            operationType = type;
            const btnCopy = document.getElementById('btnModeCopy');
            const btnMove = document.getElementById('btnModeMove');

            if(type === 'copy') {
                btnCopy.className = "flex-1 flex items-center justify-center gap-1.5 rounded-md text-[11px] transition-colors border bg-indigo-50 border-indigo-300 text-indigo-700 font-bold";
                btnMove.className = "flex-1 flex items-center justify-center gap-1.5 rounded-md text-[11px] transition-colors border bg-slate-50 border-slate-200 text-slate-600 hover:bg-white font-bold";
            } else {
                btnMove.className = "flex-1 flex items-center justify-center gap-1.5 rounded-md text-[11px] transition-colors border bg-orange-50 border-orange-300 text-orange-700 font-bold";
                btnCopy.className = "flex-1 flex items-center justify-center gap-1.5 rounded-md text-[11px] transition-colors border bg-slate-50 border-slate-200 text-slate-600 hover:bg-white font-bold";
            }
        }

        function validateStart() {
            const ext = document.getElementById('targetExtension').value.trim();
            const btnStart = document.getElementById('btnStart');
            if (sourceFiles.length > 0 && destHandle && ext !== '' && processState !== 'running') {
                btnStart.disabled = false;
            } else {
                btnStart.disabled = true;
            }
        }

        function updateUIState(state) {
            processState = state;
            const isRunning = state === 'running' || state === 'paused';
            
            document.getElementById('btnBrowseSource').disabled = isRunning;
            document.getElementById('btnBrowseDest').disabled = isRunning;
            document.getElementById('targetExtension').disabled = isRunning;
            document.getElementById('btnModeCopy').disabled = isRunning;
            document.getElementById('btnModeMove').disabled = isRunning;
            
            document.getElementById('btnStart').disabled = isRunning;
            document.getElementById('btnPause').disabled = !isRunning;
            document.getElementById('btnStop').disabled = !isRunning;

            const iconPause = document.getElementById('iconPause');
            const textPause = document.getElementById('textPause');
            
            if (state === 'paused') {
                iconPause.setAttribute('data-lucide', 'play');
                textPause.innerText = 'RESUME';
            } else {
                iconPause.setAttribute('data-lucide', 'pause');
                textPause.innerText = 'PAUSE';
            }
            lucide.createIcons();
            if(state === 'idle' || state === 'stopped') validateStart();
        }

        async function selectSourceFolder() {
            try {
                sourceDirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                document.getElementById('sourcePath').innerText = sourceDirHandle.name;
                addLog(`Asal: ${sourceDirHandle.name}`);
                
                sourceFiles = [];
                for await (const entry of sourceDirHandle.values()) {
                    if (entry.kind === 'file') {
                        sourceFiles.push({ handle: entry, name: entry.name });
                    }
                }
                addLog(`Ditemukan ${sourceFiles.length} file.`, 'success');
                validateStart();
            } catch (error) {
                addLog(`Akses Folder dibatalkan.`, 'error');
            }
        }

        async function selectDestFolder() {
            try {
                destHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                document.getElementById('destPath').innerText = destHandle.name;
                addLog(`Tujuan: ${destHandle.name}`);
                validateStart();
            } catch (error) {
                addLog(`Akses Tujuan dibatalkan.`, 'error');
            }
        }

        async function handleStart() {
            let extInput = document.getElementById('targetExtension').value.trim();
            if(!extInput.startsWith('.')) extInput = '.' + extInput;

            updateUIState('running');
            addLog(`MEMULAI ${operationType.toUpperCase()}...`);

            const totalFiles = sourceFiles.length;

            for (let i = 0; i < totalFiles; i++) {
                while (processState === 'paused') {
                    await new Promise(r => setTimeout(r, 200));
                }

                if (processState === 'stopped') {
                    addLog('Proses dihentikan.', 'warning');
                    break;
                }

                const lastDotIndex = fileItem.name.lastIndexOf('.');
                const baseName = lastDotIndex > 0 ? fileItem.name.substring(0, lastDotIndex) : fileItem.name;
                const newFileName = baseName + extInput;

                try {
                    addLog(`[${i + 1}/${totalFiles}] Memproses ${fileItem.name}...`);
                    
                    const fileData = await fileItem.handle.getFile();

                    const newFileHandle = await destHandle.getFileHandle(newFileName, { create: true });
                    const writable = await newFileHandle.createWritable();
                    await writable.write(fileData);
                    await writable.close();

                    if (operationType === 'move') {
                        await sourceDirHandle.removeEntry(fileItem.name);
                        addLog(`[${i + 1}/${totalFiles}] Dipindah: ${newFileName}`, 'success');
                    } else {
                        addLog(`[${i + 1}/${totalFiles}] Disalin: ${newFileName}`, 'success');
                    }

                } catch (error) {
                    addLog(`[${i + 1}/${totalFiles}] Gagal: ${error.message}`, 'error');
                }
            }

            if (processState === 'running') {
                addLog('SELESAI!', 'success');
                updateUIState('idle');
            }
        }

        function handlePauseResume() {
            if (processState === 'running') {
                updateUIState('paused');
                addLog('DIJEDA.', 'warning');
            } else if (processState === 'paused') {
                updateUIState('running');
                addLog('DILANJUTKAN.');
            }
        }

        function handleStop() {
            updateUIState('stopped');
        }
    </script>
</body>
</html>

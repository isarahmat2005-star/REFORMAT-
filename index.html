<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Sesuai Permintaan: Nama Tab -->
    <title>REFORMAT by IRS</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        .font-share { font-family: 'Share Tech', sans-serif; }
        
        /* Custom Scrollbar for terminal */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }

        /* Memastikan body tidak bisa di-scroll jika tidak perlu */
        body { overflow-x: hidden; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 font-share selection:bg-indigo-500/30 flex flex-col">

    <!-- Sticky Header -->
    <header class="fixed top-0 left-0 w-full bg-white border-b border-slate-200 shadow-sm z-50 p-4 flex items-center justify-between h-16">
        <div class="flex items-center gap-3">
            <i data-lucide="terminal-square" class="w-7 h-7 text-indigo-600"></i>
            <h1 class="text-3xl font-bold tracking-widest text-indigo-900 leading-none">
                REFORMAT
            </h1>
        </div>
        <div class="flex flex-col items-end justify-center font-bold tracking-widest leading-none">
            <span id="clock" class="text-indigo-600 text-[18px] leading-tight">00:00:00</span>
            <span id="dateDisplay" class="text-slate-400 text-xs leading-tight mt-0.5">00/00/0000</span>
        </div>
    </header>

    <!-- Main Content -->
    <!-- PERUBAHAN: pb-8 menjadi pb-4 untuk mengurangi sisa ruang bawah -->
    <div class="pt-20 pb-4 max-w-4xl mx-auto px-4 space-y-3 w-full flex-1">

        <!-- Top Link Buttons -->
        <!-- PERUBAHAN: gap dikurangi, padding Y dikurangi -->
        <div class="flex gap-3 mb-1">
            <a href="https://lynk.id/isaproject" target="_blank" rel="noopener noreferrer" class="flex-1 flex items-center justify-center gap-2 bg-white border border-slate-300 text-slate-700 py-2 rounded hover:bg-indigo-50 hover:text-indigo-700 hover:border-indigo-300 transition-all font-bold tracking-widest text-sm shadow-sm group">
                <i data-lucide="briefcase" class="w-4 h-4 text-indigo-500 group-hover:scale-110 transition-transform"></i>
                MY PROJECT
            </a>
            <a href="https://lynk.id/isaproject/0581ez0729vx" target="_blank" rel="noopener noreferrer" class="flex-1 flex items-center justify-center gap-2 bg-white border border-slate-300 text-slate-700 py-2 rounded hover:bg-amber-50 hover:text-amber-700 hover:border-amber-300 transition-all font-bold tracking-widest text-sm shadow-sm group">
                <i data-lucide="coffee" class="w-4 h-4 text-amber-500 group-hover:scale-110 transition-transform"></i>
                SUPPORT
            </a>
        </div>

        <!-- Main Single Card Container -->
        <!-- PERUBAHAN: Padding card (p-6 -> p-4) dan Jarak antar seksi (space-y-6 -> space-y-4) -->
        <div class="bg-white border border-slate-200 rounded-md shadow-sm p-4 space-y-4">
            
            <!-- 1. Bagian Folder Input -->
            <!-- PERUBAHAN: space-y-4 -> space-y-3, tinggi input h-[42px] -> h-[38px] -->
            <div class="space-y-3">
                <!-- Folder Asal Row -->
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500 tracking-widest">FOLDER ASAL</label>
                    <div class="flex gap-2 h-[38px]">
                        <div id="sourcePath" class="flex-1 bg-slate-50 border border-slate-300 rounded flex items-center px-3 text-sm text-slate-600 truncate" title="Belum dipilih">
                            Belum ada folder terpilih...
                        </div>
                        <button id="btnBrowseSource" onclick="selectSourceFolder()" class="bg-white border border-indigo-300 text-indigo-600 px-4 rounded hover:bg-indigo-50 transition-colors flex items-center gap-2 font-bold tracking-widest text-sm disabled:opacity-50">
                            <i data-lucide="folder-open" class="w-4 h-4"></i> PILIH
                        </button>
                    </div>
                </div>

                <!-- Folder Tujuan Row -->
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500 tracking-widest">FOLDER TUJUAN</label>
                    <div class="flex gap-2 h-[38px]">
                        <div id="destPath" class="flex-1 bg-slate-50 border border-slate-300 rounded flex items-center px-3 text-sm text-slate-600 truncate" title="Belum dipilih">
                            Belum ada folder terpilih...
                        </div>
                        <button id="btnBrowseDest" onclick="selectDestFolder()" class="bg-white border border-emerald-300 text-emerald-600 px-4 rounded hover:bg-emerald-50 transition-colors flex items-center gap-2 font-bold tracking-widest text-sm disabled:opacity-50">
                            <i data-lucide="folder-output" class="w-4 h-4"></i> PILIH
                        </button>
                    </div>
                </div>
            </div>

            <!-- 2. Pengaturan Ekstensi & Metode -->
            <!-- PERUBAHAN: gap-4 -> gap-3, tinggi tombol & input h-[40px] -> h-[38px] -->
            <div class="grid grid-cols-5 gap-3 pt-1">
                <div class="col-span-2">
                    <label class="block text-xs text-slate-500 uppercase tracking-widest mb-1 font-bold">Ubah menjadi:</label>
                    <div class="flex relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-indigo-600 font-bold">.</span>
                        <input type="text" id="targetExtension" oninput="validateStart()" placeholder="csv, txt, md" class="w-full pl-6 bg-slate-50 border border-slate-300 text-slate-800 rounded focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500 block p-2 outline-none uppercase text-sm h-[38px]">
                    </div>
                </div>

                <div class="col-span-3">
                    <label class="block text-xs text-slate-500 uppercase tracking-widest mb-1 font-bold">Metode:</label>
                    <div class="flex gap-2 h-[38px]">
                        <button id="btnModeCopy" onclick="setOperation('copy')" class="flex-1 flex items-center justify-center gap-2 rounded text-xs transition-colors border bg-indigo-50 border-indigo-300 text-indigo-700 font-bold">
                            <i data-lucide="copy" class="w-4 h-4"></i> SALIN
                        </button>
                        <button id="btnModeMove" onclick="setOperation('move')" class="flex-1 flex items-center justify-center gap-2 rounded text-xs transition-colors border bg-slate-50 border-slate-300 text-slate-600 hover:bg-white">
                            <i data-lucide="arrow-right-left" class="w-4 h-4"></i> PINDAH
                        </button>
                    </div>
                </div>
            </div>

            <!-- 3. Action Buttons -->
            <!-- PERUBAHAN: Tinggi tombol dikurangi (h-12 -> h-10) -->
            <div class="flex gap-2 h-11 pt-1">
                <button id="btnStart" onclick="handleStart()" disabled class="flex-1 flex items-center justify-center gap-1.5 text-white bg-indigo-600 rounded hover:bg-indigo-700 transition-all font-bold tracking-widest disabled:opacity-50 disabled:bg-slate-400 text-sm shadow-sm">
                    <i data-lucide="play" class="w-5 h-5 fill-current"></i> START
                </button>
                
                <button id="btnPause" onclick="handlePauseResume()" disabled class="flex-1 flex items-center justify-center gap-1.5 text-slate-700 bg-white border border-slate-300 rounded hover:bg-slate-50 transition-all font-bold tracking-widest disabled:opacity-50 disabled:text-slate-400 text-sm shadow-sm">
                    <i id="iconPause" data-lucide="pause" class="w-5 h-5"></i> <span id="textPause">PAUSE</span>
                </button>

                <button id="btnStop" onclick="handleStop()" disabled class="flex-1 flex items-center justify-center gap-1.5 text-red-600 bg-white border border-red-200 rounded hover:bg-red-50 transition-all font-bold tracking-widest disabled:opacity-50 disabled:border-slate-300 disabled:text-slate-400 text-sm shadow-sm">
                    <i data-lucide="square" class="w-5 h-5 fill-current"></i> STOP
                </button>
            </div>

            <!-- 4. Terminal Logs Section -->
            <div class="pt-1">
                <div class="flex justify-between items-end mb-1 px-1">
                    <label class="text-xs font-bold text-slate-500 tracking-widest">LOGS AKTIVITAS</label>
                    <div class="flex gap-4">
                        <button id="btnCopyLog" onclick="copyLogs()" disabled class="text-[11px] font-bold text-slate-400 hover:text-indigo-600 transition-colors uppercase tracking-widest disabled:opacity-50">
                            Salin Logs
                        </button>
                        <button id="btnClearLog" onclick="clearLogs()" disabled class="text-[11px] font-bold text-slate-400 hover:text-red-600 transition-colors uppercase tracking-widest disabled:opacity-50">
                            Hapus Logs
                        </button>
                    </div>
                </div>
                
                <!-- PERUBAHAN: Tinggi Log dikurangi secara proporsional (h-48 -> h-32) -->
                <div id="logPanel" class="h-32 bg-slate-900 border border-slate-800 rounded p-3 font-share text-xs overflow-y-auto custom-scrollbar relative shadow-inner tracking-wider">
                    <div id="emptyLog" class="text-slate-500 absolute inset-0 flex items-center justify-center tracking-widest text-sm">
                        SISTEM SIAP...
                    </div>
                    <div id="logContent" class="space-y-1"></div>
                </div>
            </div>

        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        lucide.createIcons();

        let sourceDirHandle = null;
        let destHandle = null;
        let sourceFiles = [];
        let operationType = 'copy';
        let processState = 'idle'; 
        let logsCount = 0;

        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${h}:${m}:${s}`;
            
            const dd = String(now.getDate()).padStart(2, '0');
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const yyyy = now.getFullYear();
            document.getElementById('dateDisplay').textContent = `${dd}/${mm}/${yyyy}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function addLog(message, type = 'info') {
            document.getElementById('emptyLog').style.display = 'none';
            document.getElementById('btnCopyLog').disabled = false;
            document.getElementById('btnClearLog').disabled = false;

            const time = new Date().toLocaleTimeString('id-ID', { hour12: false });
            const logContent = document.getElementById('logContent');
            const logPanel = document.getElementById('logPanel');

            let colorClass = 'text-slate-300';
            if(type === 'error') colorClass = 'text-red-400';
            if(type === 'success') colorClass = 'text-emerald-400';
            if(type === 'warning') colorClass = 'text-yellow-400';

            const div = document.createElement('div');
            div.className = colorClass;
            div.innerHTML = `<span class="text-slate-500 opacity-70">[${time}]</span> ${message}`;
            
            logContent.appendChild(div);
            logPanel.scrollTop = logPanel.scrollHeight;
            logsCount++;
        }

        function clearLogs() {
            document.getElementById('logContent').innerHTML = '';
            document.getElementById('emptyLog').style.display = 'flex';
            document.getElementById('btnCopyLog').disabled = true;
            document.getElementById('btnClearLog').disabled = true;
            logsCount = 0;
        }

        function copyLogs() {
            const logs = Array.from(document.getElementById('logContent').children).map(el => el.innerText).join('\n');
            navigator.clipboard.writeText(logs).then(() => {
                addLog("Logs berhasil disalin ke clipboard", "success");
            }).catch(() => {
                addLog("Gagal menyalin logs", "error");
            });
        }

        function setOperation(type) {
            if(processState === 'running') return;
            operationType = type;
            const btnCopy = document.getElementById('btnModeCopy');
            const btnMove = document.getElementById('btnModeMove');

            if(type === 'copy') {
                btnCopy.className = "flex-1 flex items-center justify-center gap-2 rounded text-xs transition-colors border bg-indigo-50 border-indigo-300 text-indigo-700 font-bold";
                btnMove.className = "flex-1 flex items-center justify-center gap-2 rounded text-xs transition-colors border bg-slate-50 border-slate-300 text-slate-600 hover:bg-white";
            } else {
                btnMove.className = "flex-1 flex items-center justify-center gap-2 rounded text-xs transition-colors border bg-orange-50 border-orange-300 text-orange-700 font-bold";
                btnCopy.className = "flex-1 flex items-center justify-center gap-2 rounded text-xs transition-colors border bg-slate-50 border-slate-300 text-slate-600 hover:bg-white";
            }
        }

        function validateStart() {
            const ext = document.getElementById('targetExtension').value.trim();
            const btnStart = document.getElementById('btnStart');
            if (sourceFiles.length > 0 && destHandle && ext !== '' && processState !== 'running') {
                btnStart.disabled = false;
            } else {
                btnStart.disabled = true;
            }
        }

        function updateUIState(state) {
            processState = state;
            const isRunning = state === 'running' || state === 'paused';
            
            document.getElementById('btnBrowseSource').disabled = isRunning;
            document.getElementById('btnBrowseDest').disabled = isRunning;
            document.getElementById('targetExtension').disabled = isRunning;
            document.getElementById('btnModeCopy').disabled = isRunning;
            document.getElementById('btnModeMove').disabled = isRunning;
            
            document.getElementById('btnStart').disabled = isRunning;
            document.getElementById('btnPause').disabled = !isRunning;
            document.getElementById('btnStop').disabled = !isRunning;

            const iconPause = document.getElementById('iconPause');
            const textPause = document.getElementById('textPause');
            
            if (state === 'paused') {
                iconPause.setAttribute('data-lucide', 'play');
                textPause.innerText = 'RESUME';
            } else {
                iconPause.setAttribute('data-lucide', 'pause');
                textPause.innerText = 'PAUSE';
            }
            lucide.createIcons();
            if(state === 'idle' || state === 'stopped') validateStart();
        }

        async function selectSourceFolder() {
            try {
                sourceDirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                document.getElementById('sourcePath').innerText = sourceDirHandle.name;
                addLog(`Mengakses folder asal: ${sourceDirHandle.name}...`);
                
                sourceFiles = [];
                for await (const entry of sourceDirHandle.values()) {
                    if (entry.kind === 'file') {
                        sourceFiles.push({ handle: entry, name: entry.name });
                    }
                }
                addLog(`Ditemukan ${sourceFiles.length} file di folder asal.`, 'success');
                validateStart();
            } catch (error) {
                addLog(`Akses API Folder dibatalkan atau ditolak.`, 'error');
            }
        }

        async function selectDestFolder() {
            try {
                destHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                document.getElementById('destPath').innerText = destHandle.name;
                addLog(`Folder tujuan diatur ke: ${destHandle.name}`, 'success');
                validateStart();
            } catch (error) {
                addLog(`Akses API Folder tujuan dibatalkan atau ditolak.`, 'error');
            }
        }

        async function handleStart() {
            let extInput = document.getElementById('targetExtension').value.trim();
            if(!extInput.startsWith('.')) extInput = '.' + extInput;

            updateUIState('running');
            addLog(`MEMULAI PROSES ${operationType.toUpperCase()}...`);

            const totalFiles = sourceFiles.length;

            for (let i = 0; i < totalFiles; i++) {
                while (processState === 'paused') {
                    await new Promise(r => setTimeout(r, 200));
                }

                if (processState === 'stopped') {
                    addLog('Proses dihentikan.', 'warning');
                    break;
                }

                const fileItem = sourceFiles[i];
                const lastDotIndex = fileItem.name.lastIndexOf('.');
                const baseName = lastDotIndex > 0 ? fileItem.name.substring(0, lastDotIndex) : fileItem.name;
                const newFileName = baseName + extInput;

                try {
                    addLog(`[${i + 1}/${totalFiles}] Memproses: ${fileItem.name} -> ${newFileName}...`);
                    
                    const fileData = await fileItem.handle.getFile();

                    const newFileHandle = await destHandle.getFileHandle(newFileName, { create: true });
                    const writable = await newFileHandle.createWritable();
                    await writable.write(fileData);
                    await writable.close();

                    if (operationType === 'move') {
                        await sourceDirHandle.removeEntry(fileItem.name);
                        addLog(`[${i + 1}/${totalFiles}] Dipindah & Asli dihapus: ${newFileName}`, 'success');
                    } else {
                        addLog(`[${i + 1}/${totalFiles}] Disalin: ${newFileName}`, 'success');
                    }

                } catch (error) {
                    addLog(`[${i + 1}/${totalFiles}] Gagal memproses ${fileItem.name}: ${error.message}`, 'error');
                }
            }

            if (processState === 'running') {
                addLog('SEMUA PROSES SELESAI!', 'success');
                updateUIState('idle');
            }
        }

        function handlePauseResume() {
            if (processState === 'running') {
                updateUIState('paused');
                addLog('Proses DIJEDA.', 'warning');
            } else if (processState === 'paused') {
                updateUIState('running');
                addLog('Proses DILANJUTKAN.');
            }
        }

        function handleStop() {
            updateUIState('stopped');
        }
    </script>
</body>
</html>
